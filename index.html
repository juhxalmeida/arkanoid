<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Arkanoid</title>
    <style>
/*Centraliza o canvas no meio da tela*/
        body {
            display: flex;
            justify-content: center; /*Centraliza horizontalmente*/
            align-items: center; /*Centraliza verticalmente*/
            height: 100vh; /*Define a altura como 100% da altura de tela visível*/
            margin: 0; /*Remove as margens*/
            background-color: #222;
        }    
        

        #game-container {
            position: relative;
        }
    

        #canvas {
            border: 2px solid #fff;
            background-color: #333;
            display: block;
        }
        </style>
</head>
<body>
    <div id="game-container">

        <canvas id="canvas" width="560" height="600"></canvas>
    </div>

    <script src="davi.js"></script>
</body>
</html>
